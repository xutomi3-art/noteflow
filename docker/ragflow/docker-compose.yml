# RAGFlow standalone deployment
# Deploy separately from the main Noteflow stack.
# The main docker-compose.yml connects via the `ragflow_network` external network.
#
# IMPORTANT: Always pin the RAGFlow image version. Do NOT use `latest`.
# Current pinned version: v0.24.0

services:
  ragflow:
    image: infiniflow/ragflow:v0.24.0
    container_name: ragflow-server
    entrypoint: ["./entrypoint.sh", "--workers=2"]
    ports:
      - 9380:9380
      - 9443:9443
      - 9381:80
    volumes:
      - ragflow_data:/ragflow/data
      - ragflow_logs:/ragflow/logs
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
    depends_on:
      es01:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 8g

  es01:
    image: elasticsearch:8.11.3
    container_name: ragflow-es
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
      - xpack.security.enabled=false
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'You Know, for Search'"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    mem_limit: 8g

  mysql:
    image: mysql:8.0
    container_name: ragflow-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=infini_rag_flow
      - MYSQL_DATABASE=rag_flow
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    mem_limit: 5g

  redis:
    image: redis:7-alpine
    container_name: ragflow-redis
    command: redis-server --requirepass infini_rag_flow
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "infini_rag_flow", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    mem_limit: 1g

  minio:
    image: minio/minio:latest
    container_name: ragflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rag_flow
      MINIO_ROOT_PASSWORD: infini_rag_flow
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    mem_limit: 3g

volumes:
  ragflow_data:
  ragflow_logs:
  esdata:
  mysqldata:
  redisdata:
  miniodata:

networks:
  default:
    name: ragflow_network
