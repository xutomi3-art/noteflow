upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# HTTP server — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name noteflow.jotoai.com _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — domain access (Let's Encrypt)
server {
    listen 443 ssl;
    server_name noteflow.jotoai.com;

    ssl_certificate /etc/letsencrypt/live/noteflow.jotoai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/noteflow.jotoai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 0;

    include /etc/nginx/conf.d/locations.inc;
}

# HTTPS server — IP / other access (self-signed)
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 0;

    include /etc/nginx/conf.d/locations.inc;
}
