services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://noteflow:noteflow_secret@postgres:5432/noteflow
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-noteflow-dev-secret-change-in-production}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - RAGFLOW_BASE_URL=http://host.docker.internal:9380
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      - MINERU_BASE_URL=http://host.docker.internal:8010
      - UPLOAD_DIR=/app/uploads
      - LLM_API_KEY=sk-d6a264ea0ee54726b5927fe05a1d7d04
      - LLM_BASE_URL=https://api.deepseek.com/v1
      - LLM_MODEL=deepseek-chat
      - LANG=zh_CN.UTF-8
      - LC_ALL=zh_CN.UTF-8
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-test@noteflow.dev}
      - PRESENTON_BASE_URL=http://presenton:80
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - ragflow_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  presenton:
    image: ghcr.io/presenton/presenton:latest
    environment:
      - LLM=custom
      - CUSTOM_LLM_URL=https://api.deepseek.com/v1
      - CUSTOM_LLM_API_KEY=${LLM_API_KEY:-sk-d6a264ea0ee54726b5927fe05a1d7d04}
      - CUSTOM_MODEL=deepseek-chat
      - TOOL_CALLS=false
      - DISABLE_THINKING=true
      - DISABLE_IMAGE_GENERATION=false
      - DISABLE_ANONYMOUS_TELEMETRY=true
      - CAN_CHANGE_KEYS=false
    volumes:
      - presenton_data:/app_data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=noteflow
      - POSTGRES_PASSWORD=noteflow_secret
      - POSTGRES_DB=noteflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  ragflow_network:
    external: true

volumes:
  pgdata:
  uploads:
  presenton_data:
