services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    # Reload nginx every 6h to pick up renewed certs
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://noteflow:noteflow_secret@postgres:5432/noteflow
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-noteflow-dev-secret-change-in-production}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - RAGFLOW_BASE_URL=http://host.docker.internal:9380
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      - MINERU_BASE_URL=${MINERU_BASE_URL:-http://cloud.jototech.cn:17860}
      - UPLOAD_DIR=/app/uploads
      - LLM_API_KEY=sk-d6a264ea0ee54726b5927fe05a1d7d04
      - LLM_BASE_URL=https://api.deepseek.com/v1
      - LLM_MODEL=deepseek-chat
      - LANG=zh_CN.UTF-8
      - LC_ALL=zh_CN.UTF-8
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - APP_BASE_URL=${APP_BASE_URL:-https://noteflow.jotoai.com}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-test@noteflow.dev}
      - DOCMEE_API_KEY=ak_rJJlxF3vvFvvF2sujD
      - GOOGLE_PROXY=${GOOGLE_PROXY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-https://noteflow.jotoai.com/api/auth/google/callback}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - MICROSOFT_REDIRECT_URI=${MICROSOFT_REDIRECT_URI:-https://noteflow.jotoai.com/api/auth/microsoft/callback}
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - ragflow_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=noteflow
      - POSTGRES_PASSWORD=noteflow_secret
      - POSTGRES_DB=noteflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  ragflow_network:
    external: true

volumes:
  pgdata:
  uploads:
  certbot-webroot:
  certbot-certs:
