services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/locations.inc:/etc/nginx/conf.d/locations.inc:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - landing
      - frontend
      - backend
    # Reload nginx every 6h to pick up renewed certs
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

  landing:
    build:
      context: /opt/netflow_frontend
      dockerfile: /opt/noteflow/docker/Dockerfile.landing
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://noteflow:noteflow_secret@postgres:5432/noteflow
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-noteflow-dev-secret-change-in-production}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - RAGFLOW_BASE_URL=http://ragflow-server:9380
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      - MINERU_BASE_URL=${MINERU_BASE_URL:-http://10.200.0.102:17860}
      - UPLOAD_DIR=/app/uploads
      - LLM_BASE_URL=${LLM_BASE_URL:-http://10.200.0.102:8100/v1}
      - LLM_MODEL=${LLM_MODEL:-Qwen3.5-35B}
      - LLM_CONTEXT_WINDOW=${LLM_CONTEXT_WINDOW:-32768}
      - LLM_BACKUP_ENABLED=${LLM_BACKUP_ENABLED:-true}
      - LLM_BACKUP_BASE_URL=${LLM_BACKUP_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_BACKUP_MODEL=${LLM_BACKUP_MODEL:-qwen3.5-plus}
      - LLM_BACKUP_API_KEY=${LLM_BACKUP_API_KEY:-}
      - LLM_BACKUP_CONTEXT_WINDOW=${LLM_BACKUP_CONTEXT_WINDOW:-1000000}
      - ASR_PROVIDER=${ASR_PROVIDER:-qwen3-asr}
      - QWEN3_ASR_URL=${QWEN3_ASR_URL:-http://10.200.0.102:9997/v1}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-glm-4.5v}
      - LLM_VISION_BASE_URL=${LLM_VISION_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      - LLM_VISION_API_KEY=${LLM_VISION_API_KEY:-}
      - LANG=zh_CN.UTF-8
      - LC_ALL=zh_CN.UTF-8
      - RESEND_API_KEY=re_TNip1JhN_GHgQMV69ADdT7VeLeLAyJb7w
      - APP_BASE_URL=${APP_BASE_URL:-https://noteflow.jotoai.com}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-test@noteflow.dev}
      - DOCMEE_API_KEY=ak_rJJlxF3vvFvvF2sujD
      - GOOGLE_PROXY=${GOOGLE_PROXY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-https://noteflow.jotoai.com/api/auth/google/callback}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - MICROSOFT_REDIRECT_URI=${MICROSOFT_REDIRECT_URI:-https://noteflow.jotoai.com/api/auth/microsoft/callback}
    volumes:
      - uploads:/app/uploads
      - ./backend:/app/backend
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - ragflow_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=noteflow
      - POSTGRES_PASSWORD=noteflow_secret
      - POSTGRES_DB=noteflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "maintenance_work_mem=512MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  ragflow_network:
    external: true

volumes:
  pgdata:
  uploads:
  certbot-webroot:
  certbot-certs:
